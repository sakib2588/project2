<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Project Links</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --border: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #111827 0%, var(--bg) 50%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: min(900px, 100%);
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      margin: 0 0 10px;
    }

    p {
      color: var(--muted);
      margin: 0 0 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, #111827, var(--card));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .card h2 {
      font-size: 1.2rem;
      margin: 0 0 8px;
    }

    .card p {
      margin: 0 0 16px;
      font-size: 0.95rem;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      color: #052e16;
      background: var(--accent);
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Your Public Project Hub</h1>
    <p>Use this page as the single public link to access each site in this workspace.</p>

    <section class="grid">
      <article class="card">
        <h2>Agency</h2>
        <p>Marketing and website services landing page.</p>
        <a class="btn" href="agency/">Open Site</a>
      </article>

      <article class="card">
        <h2>Luxury Real Estate</h2>
        <p>Multi-page premium real-estate themed website.</p>
        <a class="btn" href="luxury-real-estate/">Open Site</a>
      </article>
    </section>
  </main>
</body>
</html>
